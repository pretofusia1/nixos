# ===================================
# HYPRLOCK CONFIG - Lockscreen
# ===================================
# Nativer Hyprland-Lockscreen mit Screenshot-Blur

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(808080aa)
    inner_color = rgba(200, 200, 200, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = <i>Passwort eingeben...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 0.8)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Hallo, $USER
    color = rgba(200, 200, 200, 0.6)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}
